<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VAST Preview Studio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="header-content">
        <h1>VAST Preview Studio</h1>
        <p>Load and preview VAST ads with full diagnostics</p>
      </div>
      <div class="header-badge">v2.0</div>
    </header>

    <main class="main-grid">
      <!-- Left Panel: Input -->
      <section class="panel input-section">
        <div class="panel-header">
          <h2>Load Ad</h2>
          <span class="panel-icon">⚙️</span>
        </div>

        <div class="input-group">
          <label for="vastUrl">VAST URL</label>
          <div class="input-wrapper">
            <input id="vastUrl" type="text" placeholder="https://example.com/vast.xml" />
            <button id="loadUrlBtn" class="btn-icon" title="Load from URL">→</button>
          </div>
        </div>

        <div class="divider">or</div>

        <div class="input-group">
          <label for="vastXml">Paste Raw VAST XML</label>
          <textarea id="vastXml" placeholder='<?xml version="1.0" ?><VAST version="4.0">...</VAST>'></textarea>
        </div>

        <div class="options-group">
          <label class="checkbox-label">
            <input type="checkbox" id="corsProxy" />
            <span>Use CORS Proxy</span>
          </label>
          <input id="proxyUrl" type="text" placeholder="https://api.allorigins.win/raw?url=" class="proxy-input hidden" />
        </div>

        <button id="previewBtn" class="btn-primary">Load Preview</button>

        <div class="info-box">
          <span>💡</span>
          <p>Paste VAST XML directly or enter a URL. Tracking events will be logged below.</p>
        </div>
      </section>

      <!-- Center Panel: Preview -->
      <section class="panel preview-section">
        <div class="panel-header">
          <h2>Ad Preview</h2>
          <span class="status-indicator" id="statusIndicator">●</span>
        </div>

        <div class="video-container">
          <video id="adVideo" controls>
            <p>Your browser does not support the video tag.</p>
          </video>
        </div>

        <div class="playback-controls">
          <button id="playBtn" class="control-btn">▶ Play</button>
          <button id="pauseBtn" class="control-btn">⏸ Pause</button>
          <button id="stopBtn" class="control-btn">⏹ Stop</button>
          <button id="clearBtn" class="control-btn">🔄 Clear</button>
        </div>

        <div class="meta-section">
          <div class="meta-item">
            <span class="label">Duration:</span>
            <span id="duration">--:--</span>
          </div>
          <div class="meta-item">
            <span class="label">Status:</span>
            <span id="adStatus">No ad loaded</span>
          </div>
        </div>
      </section>

      <!-- Right Panel: Details & Logs -->
      <section class="panel details-section">
        <div class="panel-header">
          <h2>Diagnostics</h2>
          <button id="clearLogsBtn" class="btn-icon" title="Clear logs">×</button>
        </div>

        <div class="tabs">
          <button class="tab-btn active" data-tab="details">Details</button>
          <button class="tab-btn" data-tab="events">Events</button>
          <button class="tab-btn" data-tab="console">Console</button>
        </div>

        <div class="tab-content">
          <div id="details-tab" class="tab-pane active">
            <div class="details-grid" id="adDetails">
              <p class="placeholder">No ad loaded yet</p>
            </div>
          </div>

          <div id="events-tab" class="tab-pane">
            <div class="events-log" id="eventsList">
              <p class="placeholder">Events will appear here</p>
            </div>
          </div>

          <div id="console-tab" class="tab-pane">
            <div class="console-log" id="consoleLogs">
              <p class="log-entry log-info">Console ready</p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
